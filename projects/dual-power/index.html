<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Dual Power Model — Przemek Marcowski</title>
   <meta name="description"
      content="Dual Power Model — computational analysis of effort-based decision making. Project by Przemek Marcowski.">
   <meta property="og:title" content="Dual Power Model — Przemek Marcowski" />
   <meta property="og:description" content="Computational analysis of effort-based decision making." />
   <meta property="og:url" content="https://pmarcowski.com/projects/dual-power/" />
   <meta property="og:type" content="website" />

   <link rel="icon" href="../../favicon.png" type="image/png">

   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Archivo+Black&display=swap"
      rel="stylesheet">

   <!-- Early theme init — inherits root site preference -->
   <script>
      (function () {
         try {
            var t = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
         } catch (e) {}
      })();
   </script>

   <style>
      /* Tokens — mirror root site */
      :root,
      [data-theme="light"] {
         --bg:          #f4f4f5;
         --card:        #ffffff;
         --ink:         #18181b;
         --border:      #18181b;
         --subtle:      #52525b;
         --accent:      #2563eb;
         --accent-text: #ffffff;
      }
      [data-theme="dark"] {
         --bg:          #09090b;
         --card:        #18181b;
         --ink:         #f4f4f5;
         --border:      #f4f4f5;
         --subtle:      #a1a1aa;
         --accent:      #3b82f6;
         --accent-text: #ffffff;
      }
      :root {
         --thin: 1px;
         --font-display: 'Archivo Black', 'Archivo', sans-serif;
         --font-body:    'Archivo', sans-serif;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html { background: var(--bg); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

      body {
         background: var(--bg);
         color: var(--ink);
         font-family: var(--font-body);
         font-weight: 500;
         font-size: 15px;
         line-height: 1.5;
         min-height: 100vh;
         display: flex;
         flex-direction: column;
         align-items: center;
         justify-content: center;
         padding: 2rem 1.25rem;
         gap: 1.5rem;
         transition: background 0.2s ease, color 0.2s ease;
      }

      a { color: inherit; text-decoration: none; }
      ::selection { background: var(--accent); color: var(--accent-text); }

      a:focus-visible, button:focus-visible {
         outline: 2px solid var(--accent);
         outline-offset: 2px;
      }

      /* ===== CARD — the whole interface ===== */
      .card {
         background: var(--card);
         border: var(--thin) solid var(--border);
         max-width: 520px;
         width: 100%;
         padding: 2.5rem 2.25rem;
         display: flex;
         flex-direction: column;
         align-items: flex-start;
         gap: 1rem;
      }

      .kicker {
         display: inline-block;
         font-size: 11.5px;
         font-weight: 900;
         letter-spacing: 0.16em;
         text-transform: uppercase;
         color: var(--accent);
         padding: 0.1rem 0 0.35rem;
         border-bottom: 2px solid var(--accent);
         margin-bottom: 1.25rem;
      }

      .title {
         font-family: var(--font-display);
         font-weight: 900;
         font-size: clamp(2rem, 5.5vw, 3rem);
         line-height: 0.88;
         letter-spacing: -0.02em;
         text-transform: uppercase;
         color: var(--ink);
         margin-left: -0.02em;
         text-wrap: balance;
      }

      .lede {
         font-size: 1rem;
         font-weight: 500;
         line-height: 1.4;
         color: var(--ink);
         max-width: 40ch;
         margin-bottom: 0.5rem;
      }

      .actions {
         display: flex;
         flex-wrap: wrap;
         gap: 0.6rem;
         width: 100%;
      }

      .btn {
         display: inline-flex;
         align-items: center;
         justify-content: center;
         gap: 0.5rem;
         flex: 1 1 0;
         min-width: 0;
         padding: 0.7rem 1.15rem;
         background: var(--ink);
         color: var(--bg);
         font-family: var(--font-body);
         font-size: 13px;
         font-weight: 900;
         letter-spacing: 0.08em;
         text-transform: uppercase;
         white-space: nowrap;
         border: var(--thin) solid var(--ink);
         transition: background 0.15s, color 0.15s, border-color 0.15s;
      }
      .btn:hover {
         background: var(--accent);
         color: var(--accent-text);
         border-color: var(--accent);
      }
      .btn.secondary {
         background: transparent;
         color: var(--ink);
      }
      .btn .arrow { display: inline-block; transition: transform 0.15s; }
      .btn:hover .arrow { transform: translate(2px, -2px); }

      /* ===== BACK LINK — sits above the card, subtle ===== */
      .back-link {
         font-size: 11px;
         font-weight: 900;
         letter-spacing: 0.14em;
         text-transform: uppercase;
         color: var(--subtle);
         position: relative;
         padding: 0.25rem 0;
         transition: color 0.15s, padding-left 0.15s;
      }
      .back-link:hover {
         color: var(--accent);
         padding-left: 0.3rem;
      }
      .back-link .arrow {
         display: inline-block;
         margin-right: 0.35rem;
         transition: transform 0.15s;
      }
      .back-link:hover .arrow { transform: translateX(-3px); }

      @media (max-width: 560px) {
         .card { padding: 2rem 1.5rem; }
         .actions { flex-direction: column; }
         .btn { flex: 0 0 auto; justify-content: center; }
      }

      @media (prefers-reduced-motion: reduce) {
         *, *::before, *::after {
            transition: none !important;
         }
      }
   </style>
</head>

<body>

   <a href="../../index.html" class="back-link">
      <span class="arrow" aria-hidden="true">←</span> Back to Home
   </a>

   <article class="card">
      <span class="kicker">Project</span>
      <h1 class="title">Dual Power Model</h1>
      <p class="lede">Computational analysis of effort-based decision making.</p>

      <div class="actions">
         <a href="https://dual-power-model.onrender.com/" class="btn" target="_blank" rel="noopener">
            Launch Visualizer <span class="arrow" aria-hidden="true">↗</span>
         </a>
         <a href="video.html" class="btn secondary">
            View Simulation <span class="arrow" aria-hidden="true">↗</span>
         </a>
      </div>
   </article>

</body>

</html>
